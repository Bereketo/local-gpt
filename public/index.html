<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local GPT</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Conversations">
        <div class="brand-row">
          <div class="brand-mark">LG</div>
          <div>
            <h1>Local GPT</h1>
            <p>Private model workspace</p>
          </div>
        </div>

        <button class="new-chat-button" id="newChatButton" type="button">
          <span aria-hidden="true">+</span>
          New chat
        </button>

        <label class="search-field">
          Search chats
          <input id="conversationSearchInput" type="search" placeholder="Filter conversations..." autocomplete="off" />
        </label>

        <nav class="conversation-list" id="conversationList"></nav>

        <div class="sidebar-footer">
          <button class="ghost-button" id="pinChatButton" type="button">Pin</button>
          <button class="ghost-button" id="renameChatButton" type="button">Rename</button>
          <button class="ghost-button danger" id="deleteChatButton" type="button">Delete</button>
        </div>
      </aside>

      <main class="chat-panel">
        <header class="topbar">
          <div class="chat-title">
            <h2 id="activeChatTitle">New local chat</h2>
            <p><span id="activeModelLabel">No model selected</span> · <span id="activeProfileLabel">General</span></p>
          </div>

          <div class="topbar-actions">
            <div class="status-pill" id="connectionStatus">Not connected</div>
            <button class="ghost-button" id="settingsButton" type="button">Settings</button>
          </div>
        </header>

        <section class="setup-panel" id="setupPanel" aria-live="polite"></section>

        <section class="messages" id="messages" aria-live="polite"></section>

        <form class="composer" id="composer">
          <div class="composer-box">
            <textarea id="messageInput" rows="1" placeholder="Ask your local model anything..." autocomplete="off"></textarea>
            <button id="sendButton" type="submit">Send</button>
          </div>
        </form>
      </main>
    </div>

    <div class="settings-backdrop" id="settingsBackdrop" hidden>
      <section class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
        <header class="settings-modal-head">
          <div>
            <h2 id="settingsTitle">Settings</h2>
            <p>Provider, model, and per-chat behavior.</p>
          </div>
          <button class="icon-button" id="closeSettingsButton" type="button" aria-label="Close settings">×</button>
        </header>

        <div class="settings-section">
          <h3>Model</h3>
          <div class="provider-controls">
            <label>
              Provider
              <select id="providerSelect">
                <option value="ollama">Ollama</option>
                <option value="llama.cpp">llama.cpp</option>
              </select>
            </label>
            <label class="toggle-field">
              <input id="autoStartToggle" type="checkbox" />
              <span>Auto-start server</span>
            </label>
            <label class="endpoint-field">
              Endpoint
              <input id="baseUrlInput" type="url" spellcheck="false" />
            </label>
            <label>
              Model
              <select id="modelSelect"></select>
            </label>
            <button class="icon-button" id="refreshModelsButton" type="button" title="Refresh models" aria-label="Refresh models">
              ↻
            </button>
          </div>
        </div>

        <div class="settings-section llama-launcher" id="llamaLauncher">
          <div class="settings-head">
            <div>
              <h3>llama.cpp Server</h3>
              <p id="llamaServerStatus">Start a local GGUF model with llama-server.</p>
            </div>
            <button class="ghost-button" id="stopLlamaButton" type="button">Stop</button>
          </div>
          <div class="llama-launch-grid">
            <label class="llama-path-field">
              GGUF model path
              <input id="llamaModelPathInput" type="text" spellcheck="false" placeholder="/path/to/model.gguf" />
            </label>
            <label>
              Port
              <input id="llamaPortInput" type="number" min="1" max="65535" value="8080" />
            </label>
            <label>
              Context
              <input id="llamaContextInput" type="number" min="512" step="512" placeholder="Auto" />
            </label>
            <label>
              GPU layers
              <input id="llamaGpuLayersInput" type="number" min="0" step="1" placeholder="Auto" />
            </label>
            <button class="ghost-button primary" id="startLlamaButton" type="button">Start server</button>
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-head">
            <div>
              <h3>Chat Profile</h3>
              <p id="profileDescription">Choose how this conversation should behave.</p>
            </div>
            <label class="profile-select-field">
              Profile
              <select id="profileSelect">
                <option value="general">General</option>
                <option value="coding">Coding</option>
                <option value="hacking">Hacking</option>
                <option value="direct">Direct</option>
              </select>
            </label>
          </div>

          <div class="profile-pills" aria-label="Profile presets">
            <button class="profile-pill" type="button" data-profile="general">General</button>
            <button class="profile-pill" type="button" data-profile="coding">Coding</button>
            <button class="profile-pill" type="button" data-profile="hacking">Hacking</button>
            <button class="profile-pill" type="button" data-profile="direct">Direct</button>
          </div>
        </div>

        <div class="settings-section settings-grid">
          <label class="system-prompt-field">
            System prompt
            <textarea id="systemPromptInput" rows="2" placeholder="System prompt for this chat..."></textarea>
          </label>
          <label>
            Temperature
            <input id="temperatureInput" type="range" min="0" max="2" step="0.1" value="0.7" />
            <output id="temperatureValue">0.7</output>
          </label>
          <label>
            Context
            <input id="contextInput" type="number" min="512" step="512" value="4096" />
          </label>
          <label>
            Max tokens
            <input id="maxTokensInput" type="number" min="128" step="128" placeholder="Auto" />
          </label>
          <label>
            Top-p
            <input id="topPInput" type="number" min="0" max="1" step="0.05" value="0.9" />
          </label>
          <label>
            Repeat penalty
            <input id="repeatPenaltyInput" type="number" min="0.8" max="2" step="0.05" value="1.1" />
          </label>
          <label>
            Seed
            <input id="seedInput" type="number" step="1" placeholder="Random" />
          </label>
        </div>
      </section>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
